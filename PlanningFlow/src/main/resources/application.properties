spring.application.name=PlanningFlow

spring.datasource.driver-class-name = org.postgresql.Driver
spring.datasource.url = jdbc:postgresql://localhost:5432/plan_flow
spring.datasource.username = ${USERNAME_POSTGRES}
spring.datasource.password = ${PASSWORD_POSTGRES}

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql = TRUE
spring.jpa.properties.hibernate.show_sql = TRUE
spring.jpa.hibernate.ddl-auto = update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.access-token-ttl=15m
jwt.refresh-token-ttl=14d

gigachat.auth=${GIGACHAT_AUTH:}
gigachat.oauth-url=https://ngw.devices.sberbank.ru:9443/api/v2/oauth
gigachat.chat-completions-url=https://gigachat.devices.sberbank.ru/api/v1/chat/completions
gigachat.model=GigaChat
gigachat.temperature=0.7
gigachat.trust-all-ssl=${GIGACHAT_TRUST_ALL_SSL:true}
gigachat.token-valid-millis=1500000

planningflow.external.simulation.chaos-enabled=true

# Swagger UI: http://localhost:8080/swagger-ui/index.html (порт см. server.port)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
